<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>DRIVX — VTC Fleet Platform</title>
<style>
  * { margin:0; padding:0; box-sizing:border-box; }
  body { background:#060d16; font-family:'Outfit',sans-serif; display:flex; align-items:center; justify-content:center; min-height:100vh; }
  .container { text-align:center; padding:40px 20px; }
  .logo { font-size:42px; font-weight:900; color:#00d4ff; letter-spacing:-1px; margin-bottom:6px; }
  .sub { font-size:14px; color:#4a5568; margin-bottom:48px; letter-spacing:2px; text-transform:uppercase; }
  .cards { display:grid; grid-template-columns:repeat(auto-fit,minmax(200px,1fr)); gap:16px; max-width:860px; }
  .card { background:#0d1b2a; border:1px solid #1a2d42; border-radius:20px; padding:32px 24px; text-decoration:none; transition:all 0.2s; cursor:pointer; }
  .card:hover { border-color:#00d4ff44; transform:translateY(-2px); background:#0f2035; }
  .card-icon { font-size:40px; margin-bottom:16px; }
  .card-title { font-size:16px; font-weight:800; color:#e2e8f0; margin-bottom:6px; }
  .card-desc { font-size:12px; color:#4a5568; line-height:1.5; }
  .card.admin { border-color:#00d4ff33; }
  .card.driver { border-color:#34d18633; }
  .card.supervisor { border-color:#7c5cfc33; }
  .card.owner { border-color:#ffb30033; }
</style>
</head>
<body>
<div class="container">
  <div class="logo">DRIVX</div>
  <div class="sub">VTC Fleet Platform</div>
  <div class="cards">
    <a href="/vtc-dashboard.html" class="card admin">
      <div class="card-icon">🖥️</div>
      <div class="card-title">Dashboard Admin</div>
      <div class="card-desc">Gestión completa de la flota, conductores y facturación</div>
    </a>
    <a href="/drivx-driver-app.html" class="card driver">
      <div class="card-icon">🚗</div>
      <div class="card-title">App Conductor</div>
      <div class="card-desc">Fichar, gastos, facturación de plataformas</div>
    </a>
    <a href="/drivx-supervisor-app.html" class="card supervisor">
      <div class="card-icon">👁️</div>
      <div class="card-title">App Supervisor</div>
      <div class="card-desc">Control de vehículos, citas y documentación</div>
    </a>
    <a href="/drivx-owner-app.html" class="card owner">
      <div class="card-icon">👑</div>
      <div class="card-title">App Owner</div>
      <div class="card-desc">Vista ejecutiva y rendimiento de la flota</div>
    </a>
  </div>
</div>
</body>
</html>
